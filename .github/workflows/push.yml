name: push

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
      - uses: ./.github/actions/lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
      - uses: ./.github/actions/test

  demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
        with:
          tools: rust bun cargo:wasm-pack

      - name: Installing Demo Dependencies
        working-directory: demo
        run: mise x -- bun install --frozen-lockfile

      - name: Building WASM Package
        run: mise run demo:build

      - name: Type Checking Demo
        working-directory: demo
        run: mise x -- bun run check

      - name: Building Demo Bundle
        working-directory: demo
        run: mise x -- bun run build

      - name: Configuring GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Uploading GitHub Pages Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: demo/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: demo
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Deploying GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    if: >-
      success()
      && github.event_name == 'push'
      && (
        github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/v')
      )
    needs:
      - lint
      - test
    permissions:
      contents: read
    secrets:
      inherit
    uses: ./.github/workflows/publish.yml
