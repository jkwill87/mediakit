name: publish

on:
  workflow_call:

permissions:
  contents: read

jobs:
  publish-crates-io:
    runs-on: ubuntu-latest
    concurrency:
      group: crates-io-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/init

      - name: Determining Package Version
        id: package
        run: bash .github/scripts/package-version.sh

      - name: Applying Package Version
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          awk -v version="$PACKAGE_VERSION" '
            /^\[package\]$/ {
              in_package = 1
              print
              next
            }
            /^\[/ && in_package {
              in_package = 0
            }
            in_package && !updated && /^version = / {
              print "version = \"" version "\""
              updated = 1
              next
            }
            { print }
            END {
              if (!updated) {
                exit 1
              }
            }
          ' Cargo.toml > Cargo.toml.next
          mv Cargo.toml.next Cargo.toml
          mise x -- cargo check

      - name: Packaging
        run: mise x -- cargo package --locked --allow-dirty

      - name: Publishing to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: mise x -- cargo publish --registry crates-io --locked --allow-dirty
