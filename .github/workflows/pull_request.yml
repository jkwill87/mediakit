name: pr

on: pull_request

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
        with:
          save-cache: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: ./.github/actions/lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
        with:
          save-cache: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      - uses: ./.github/actions/test

  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/init
        with:
          tools: rust bun cargo:wasm-pack
          save-cache: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Installing Demo Dependencies
        working-directory: demo
        run: mise x -- bun install --frozen-lockfile

      - name: Building WASM Package
        run: mise run demo:build

      - name: Type Checking Demo
        working-directory: demo
        run: mise x -- bun run check

      - name: Building Demo Bundle
        working-directory: demo
        run: mise x -- bun run build
